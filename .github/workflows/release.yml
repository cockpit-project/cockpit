name: release
on:
  workflow_dispatch:
  push:
    tags:
      # this is a glob, not a regexp
      - '[0-9]*'


jobs:
  source:
    runs-on: ubuntu-latest
    permissions:
      # create GitHub release
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Workaround for https://github.com/actions/checkout/pull/697
        run: git fetch --force origin $(git describe --tags):refs/tags/$(git describe --tags)

      - name: Build release
        run: tools/release '${{ github.server_url }}/${{ github.repository }}' '${{ github.ref_name }}'

      - name: Create a release
        run: |
          set -x

          TAG_VERSION="$(git describe --tags)"
          git tag -l --format='%(contents:body)' ${TAG_VERSION} > release-note.txt

          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          gh release create --title ${TAG_VERSION} --notes-file release-note.txt  \
            ${TAG_VERSION} \
            ${REPO_NAME}-${TAG_VERSION}.tar.xz \
            ${REPO_NAME}-node-${TAG_VERSION}.tar.xz

    outputs:
      filename: ${{ steps.publish.outputs.filename }}
      checksum: ${{ steps.publish.outputs.checksum }}
      download: ${{ steps.publish.outputs.download }}
      body: ${{ steps.publish.outputs.body }}

  guide:
    needs: source
    uses: ./.github/workflows/update-guide.yml
    with:
      release_tag: ${{ github.ref_name }}


  flathub:
    needs: source
    uses: ./.github/workflows/release-flathub.yml
    with:
      release_tag: ${{ github.ref_name }}

  node-cache:
    needs: [source]
    uses: ./.github/workflows/node-cache.yml
